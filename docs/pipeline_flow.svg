<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background: #ffffff;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- USER INPUT -->
  <rect x="190" y="20" width="300" height="52" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="340" y="43" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">User input</text>
  <text x="340" y="61" text-anchor="middle" font-size="12" fill="#5F5E5A">Campaign brief (plain text)</text>

  <!-- Arrow 1 -->
  <line x1="340" y1="72" x2="340" y2="108" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- BRIEF AGENT -->
  <rect x="160" y="108" width="360" height="64" rx="10" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="340" y="131" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">Brief agent</text>
  <text x="340" y="153" text-anchor="middle" font-size="12" fill="#3C3489">Converts brief → structured JSON plan</text>
  <text x="540" y="143" font-size="11" fill="#888780">Marketing Strategist</text>
  <line x1="520" y1="140" x2="537" y2="140" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2"/>

  <!-- Arrow 2 -->
  <line x1="340" y1="172" x2="340" y2="208" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- CREATOR AGENT -->
  <rect x="160" y="208" width="360" height="64" rx="10" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="340" y="231" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">Creator agent</text>
  <text x="340" y="253" text-anchor="middle" font-size="12" fill="#0F6E56">Blog + LinkedIn post + Twitter thread</text>
  <text x="540" y="243" font-size="11" fill="#888780">Content Writer</text>
  <line x1="520" y1="240" x2="537" y2="240" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2"/>

  <!-- Arrow 3 -->
  <line x1="340" y1="272" x2="340" y2="308" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- COMPLIANCE AGENT -->
  <rect x="160" y="308" width="360" height="64" rx="10" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="340" y="331" text-anchor="middle" font-size="14" font-weight="500" fill="#412402">Compliance agent</text>
  <text x="340" y="353" text-anchor="middle" font-size="12" fill="#854F0B">Checks for risky or misleading claims</text>
  <text x="540" y="343" font-size="11" fill="#888780">Compliance Officer</text>
  <line x1="520" y1="340" x2="537" y2="340" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2"/>

  <!-- No issues arrow down -->
  <line x1="340" y1="372" x2="340" y2="395" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="356" y="388" font-size="11" fill="#3B6D11">No issues</text>

  <!-- Issues found → rewriter (right elbow) -->
  <path d="M520 340 L580 340 L580 446 L520 446" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="590" y="396" font-size="11" fill="#5F5E5A">Issues found</text>
  <text x="590" y="412" font-size="11" fill="#5F5E5A">(max 2×)</text>

  <!-- REWRITER AGENT -->
  <rect x="370" y="420" width="150" height="52" rx="10" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
  <text x="445" y="443" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C">Rewriter agent</text>
  <text x="445" y="461" text-anchor="middle" font-size="12" fill="#993C1D">Fixes flagged issues</text>

  <!-- Rewriter loops back to compliance -->
  <path d="M370 446 L140 446 L140 340 L160 340" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- Continue down to localization -->
  <line x1="340" y1="395" x2="340" y2="500" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LOCALIZATION AGENT -->
  <rect x="160" y="500" width="360" height="64" rx="10" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="340" y="523" text-anchor="middle" font-size="14" font-weight="500" fill="#042C53">Localization agent</text>
  <text x="340" y="545" text-anchor="middle" font-size="12" fill="#185FA5">Converts content to Hinglish</text>
  <text x="540" y="535" font-size="11" fill="#888780">Hinglish Copywriter</text>
  <line x1="520" y1="532" x2="537" y2="532" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2"/>

  <!-- Arrow 5 -->
  <line x1="340" y1="564" x2="340" y2="600" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- OUTPUT -->
  <rect x="130" y="600" width="420" height="52" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="340" y="623" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Streamlit UI output</text>
  <text x="340" y="641" text-anchor="middle" font-size="12" fill="#5F5E5A">Tab 1: Plan · Tab 2: Content · Tab 3: Hinglish</text>

  <!-- LLM bracket left -->
  <rect x="14" y="108" width="88" height="456" rx="8" fill="none" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="58" y="340" text-anchor="middle" font-size="11" fill="#888780" transform="rotate(-90,58,340)">Llama 3.1 8B · HF novita</text>
</svg>
